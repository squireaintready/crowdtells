<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,follow" />
    <title>Page not found — Crowdtells</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#fbfaf7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#16140f" media="(prefers-color-scheme: dark)" />
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font-family: Georgia, 'Times New Roman', serif;
        max-width: 560px;
        margin: 0 auto;
        padding: 18vh 1.25rem 5rem;
        line-height: 1.6;
        color: #1a1813;
        background: #fbfaf7;
        text-align: center;
      }
      @media (prefers-color-scheme: dark) {
        body {
          color: #e8e3d8;
          background: #16140f;
        }
      }
      a {
        color: #27496d;
      }
      @media (prefers-color-scheme: dark) {
        a {
          color: #8fb3d9;
        }
      }
      .mark {
        width: 56px;
        height: 56px;
        margin: 0 auto 1.25rem;
        display: block;
      }
      h1 {
        font-size: 2rem;
        line-height: 1.15;
        margin: 0 0 0.5rem;
      }
      p {
        color: #6f695e;
        margin: 0 0 1.75rem;
      }
      @media (prefers-color-scheme: dark) {
        p {
          color: #b3aa9a;
        }
      }
      .cta {
        display: inline-block;
        background: #27496d;
        color: #fbfaf7;
        font-family: system-ui, sans-serif;
        font-weight: 700;
        font-size: 0.95rem;
        text-decoration: none;
        border-radius: 999px;
        padding: 11px 24px;
      }
      @media (prefers-color-scheme: dark) {
        .cta {
          color: #16140f;
          background: #8fb3d9;
        }
      }
    </style>
  </head>
  <body>
    <img class="mark" src="/icon.svg" alt="Crowdtells" width="56" height="56" />
    <h1>Page not found</h1>
    <p>
      This page doesn't exist — a shared story may have aged out of the live feed. The feed
      refreshes every few minutes with what the crowd is pricing right now.
    </p>
    <a class="cta" href="/">Go to the live feed →</a>
  </body>
</html>
